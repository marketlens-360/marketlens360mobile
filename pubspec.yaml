name: marketlens360mobile
description: Kenyan stock market & investment fund analytics
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.20.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.0

  # Networking
  dio: ^5.8.0
  pretty_dio_logger: ^1.4.0

  # Routing
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.70.2
  financial_chart: ^0.2.3

  # Local storage / offline
  drift: ^2.22.0
  drift_flutter: ^0.2.4
  shared_preferences: ^2.3.5

  # Auth
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4
  google_sign_in: ^6.2.2
  flutter_secure_storage: ^9.2.4

  # Notifications
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # Background tasks
  workmanager: ^0.9.0

  # Homescreen widgets
  home_widget: ^0.7.0

  # Subscriptions
  purchases_flutter: ^8.0.0

  # Icons
  flutter_lucide: ^0.0.1

  # UI
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  gap: ^3.0.1
  intl: ^0.20.2

  # Biometrics
  local_auth: ^2.3.0

  # Connectivity
  connectivity_plus: ^6.1.1
  internet_connection_checker_plus: ^2.5.1

  # Utilities
  logger: ^2.5.0
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.22.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/Plus_Jakarta_Sans/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/Plus_Jakarta_Sans/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/Plus_Jakarta_Sans/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Plus_Jakarta_Sans/PlusJakartaSans-Bold.ttf
          weight: 700
    - family: IBMPlexSans
      fonts:
        - asset: assets/fonts/IBM_Plex_Sans/IBMPlexSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/IBM_Plex_Sans/IBMPlexSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBM_Plex_Sans/IBMPlexSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBM_Plex_Sans/IBMPlexSans-Bold.ttf
          weight: 700
